<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spendwise — Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="brand">
    <span class="brand-icon">◈</span>
    <span class="brand-name">Spendwise</span>
  </div>

  <nav class="nav">
    <button class="nav-item active" data-view="dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="nav-item" data-view="expenses">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Expenses
    </button>
    <button class="nav-item" data-view="add">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Add Expense
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="month-picker-wrap">
      <label>Viewing</label>
      <input type="month" id="globalMonth" />
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">

  <!-- DASHBOARD VIEW -->
  <section class="view active" id="view-dashboard">
    <header class="page-header">
      <h1>Dashboard</h1>
      <span class="header-sub" id="dashMonth"></span>
    </header>

    <div class="stat-row">
      <div class="stat-card accent">
        <div class="stat-label">Total Spent</div>
        <div class="stat-value" id="totalSpent">₹0</div>
        <div class="stat-sub" id="totalCount">0 transactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg per Day</div>
        <div class="stat-value" id="avgDay">₹0</div>
        <div class="stat-sub">this month</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Top Category</div>
        <div class="stat-value small" id="topCategory">—</div>
        <div class="stat-sub" id="topCatAmt">₹0</div>
      </div>
    </div>

    <div class="chart-row">
      <div class="card chart-card">
        <div class="card-title">Spending by Category</div>
        <div class="donut-wrap">
          <canvas id="donutChart" width="220" height="220"></canvas>
          <div class="donut-center">
            <div class="donut-total" id="donutTotal">₹0</div>
            <div class="donut-label">total</div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>

      <div class="card chart-card">
        <div class="card-title">Daily Spending</div>
        <canvas id="barChart" width="400" height="220"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Recent Transactions</div>
      <div id="recentList" class="tx-list"></div>
    </div>
  </section>

  <!-- EXPENSES VIEW -->
  <section class="view" id="view-expenses">
    <header class="page-header">
      <h1>All Expenses</h1>
      <div class="filter-row">
        <select id="filterCategory">
          <option value="All">All Categories</option>
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
    </header>
    <div class="card">
      <div id="allExpensesList" class="tx-list"></div>
    </div>
  </section>

  <!-- ADD EXPENSE VIEW -->
  <section class="view" id="view-add">
    <header class="page-header">
      <h1>Add Expense</h1>
    </header>
    <div class="card form-card">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="e.g. Grocery shopping" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="fDate" />
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <div class="cat-grid" id="catGrid">
          {% for cat in categories %}
          <button class="cat-btn" data-cat="{{ cat }}" style="--cat-color: {{ colors[cat] }}">
            {{ cat }}
          </button>
          {% endfor %}
        </div>
      </div>
      <div class="form-group">
        <label>Note <span class="optional">(optional)</span></label>
        <input type="text" id="fNote" placeholder="Any additional details..." />
      </div>
      <button class="btn-primary" id="submitExpense">Add Expense</button>
      <div id="formMsg" class="form-msg"></div>
    </div>
  </section>

</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span>Edit Expense</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="mTitle" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="mAmount" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="mDate" />
      </div>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="mCategory">
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Note</label>
      <input type="text" id="mNote" />
    </div>
    <button class="btn-primary" id="saveEdit">Save Changes</button>
  </div>
</div>

<script>
  const CATEGORY_COLORS = {{ colors | tojson }};
</script>
<script src="/static/js/app.js"></script>
</body>
</html>
